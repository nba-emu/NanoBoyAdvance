  build-linux:
    runs-on: [self-hosted, linux, X64]
    steps:
      - uses: actions/checkout@v6
      - name: Setup dependencies
        run: |
          sudo apt update -qq
          sudo apt install -y libfmt-dev libsdl2-dev ninja-build python3-jinja2 python3-lxml qt6-base-dev
      - name: Build NanoBoyAdvance
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DWEIRD_STUPID_CI_BULLSHIT_DISABLE_TOML11_PRETTY_PLEASE=ON
          cmake --build build -j$(nproc)
      - name: Collect artifacts
        run: |
          mkdir upload
          cp -r build/bin/qt/release/{NanoBoyAdvance,config.toml} upload
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: NanoBoyAdvance-${{ runner.os }}-${{ runner.arch }}
          path: upload
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Setup dependencies
        env:
          HOMEBREW_NO_ANALYTICS: 1
        run: |
          brew install fmt qt@6 sdl2 toml11
          python3 -m pip install Jinja2
      - name: Build NanoBoyAdvance
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DMACOS_BUILD_APP_BUNDLE=ON
          cmake --build build -j$(sysctl -n hw.logicalcpu)
      - name: Create disk image
        run: |
          mkdir dmg
          cp -a build/bin/qt/Release/NanoBoyAdvance.app dmg/NanoBoyAdvance.app
          codesign -s - --deep -f dmg/NanoBoyAdvance.app
          ln -s /Applications dmg/Applications
          hdiutil create -fs HFS+ -volname NanoBoyAdvance -srcfolder dmg -ov -format UDBZ NanoBoyAdvance.dmg
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: NanoBoyAdvance-${{ runner.os }}-${{ runner.arch }}
          path: NanoBoyAdvance-arm64.dmg
          archive: false
          if-no-files-found: error
