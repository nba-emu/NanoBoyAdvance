name: Build

on: [push, pull_request, workflow_dispatch]

jobs:
  build-win64:
    runs-on: windows-2025-vs2026
    steps:
      - uses: actions/checkout@v6
        with:
          path: NanoBoyAdvance
      - name: Cache prebuilt libraries
        id: cache-windows-prebuilts
        uses: actions/cache@v5
        with:
          path: ext-windows-bin
          key: ${{ runner.os }}-prebuilts
      - name: Check out prebuilt libraries
        if: steps.cache-windows-prebuilts.outputs.cache-hit != 'true'
        uses: actions/checkout@v6
        with:
          repository: nba-emu/ext-windows-bin
          path: ext-windows-bin
          lfs: true
      - name: Extract prebuilt libraries
        if: steps.cache-windows-prebuilts.outputs.cache-hit != 'true'
        run: |
          Set-Location -Path ext-windows-bin
          zstd -d -T0 --rm $(Get-ChildItem *.zst)
          foreach ($file in Get-ChildItem *.tar) { tar xf $file; Remove-Item $file }
      - name: Build
        run: |
          cmake -S $env:GITHUB_WORKSPACE\NanoBoyAdvance -B $env:GITHUB_WORKSPACE\build -G Ninja "-DSDL2_DIR=$env:GITHUB_WORKSPACE\ext-windows-bin\SDL2-2.32.10\cmake" "-DQt6_DIR=$env:GITHUB_WORKSPACE\ext-windows-bin\Qt-6.11.0\lib\cmake\Qt6" -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang -DCMAKE_BUILD_TYPE=Release
          cmake --build $env:GITHUB_WORKSPACE\build -j $([Environment]::ProcessorCount)
      - name: Collect artifacts
        run: |
          New-Item -ItemType Directory upload
          Copy-Item -Recurse build\bin\qt\Release\platforms,build\bin\qt\Release\styles,build\bin\qt\Release\NanoBoyAdvance.exe,build\bin\qt\Release\Qt6Core.dll,build\bin\qt\Release\Qt6Gui.dll,build\bin\qt\Release\Qt6Widgets.dll,ext-windows-bin\SDL2-2.32.10\lib\SDL2.dll -Destination upload
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: NanoBoyAdvance-${{ runner.os }}-${{ runner.arch }}
          path: upload
          if-no-files-found: error

  build-linux:
    runs-on: [self-hosted, linux, X64]
    steps:
      - uses: actions/checkout@v6
      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DPORTABLE_MODE=OFF
          cmake --build build -j$(nproc)
      - name: Create AppDir
        run: | # Yes, this is done by hand. fight me
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/128x128/apps
          cp -r build/bin/qt/Release/NanoBoyAdvance AppDir/usr/bin/
          cp -r src/platform/qt/resources/Linux/io.nanoboyadvance.NanoBoyAdvance.desktop AppDir/usr/share/applications/
          cp -r src/platform/qt/resources/Linux/io.nanoboyadvance.NanoBoyAdvance.png AppDir/usr/share/icons/hicolor/128x128/apps/
      - name: Build AppImage
        env:
          EXTRA_PLATFORM_PLUGINS: libqwayland-egl.so;libqwayland-generic.so
          EXTRA_QT_PLUGINS: core;dbus;gui;waylandcompositor;widgets
          QMAKE: /usr/lib/qt6/bin/qmake
        run: /usr/local/bin/linuxdeploy --appdir AppDir --plugin qt --output appimage
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: NanoBoyAdvance-${{ runner.os }}-${{ runner.arch }}
          path: NanoBoyAdvance*.AppImage
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup dependencies
        env:
          HOMEBREW_NO_ANALYTICS: 1
        run: |
          brew install qt@6 sdl2
      - name: Build
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DMACOS_BUILD_APP_BUNDLE=ON
          cmake --build build -j$(sysctl -n hw.logicalcpu)
      - name: Create disk image
        run: |
          mkdir dmg
          cp -a build/bin/qt/Release/NanoBoyAdvance.app dmg/NanoBoyAdvance.app
          codesign -s - --deep -f dmg/NanoBoyAdvance.app
          ln -s /Applications dmg/Applications
          hdiutil create -fs HFS+ -volname NanoBoyAdvance -srcfolder dmg -ov -format UDBZ NanoBoyAdvance-arm64.dmg
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: NanoBoyAdvance-${{ runner.os }}-${{ runner.arch }}
          path: NanoBoyAdvance-arm64.dmg
          archive: false
          if-no-files-found: error
